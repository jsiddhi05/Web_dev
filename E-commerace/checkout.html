<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f5f5;
}

.bill-box{
  background:white;
  padding:20px;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="row">

<!-- LOGIN FORM -->
<div class="col-md-6">

<h3>Customer Details</h3>

<form onsubmit="confirmOrder(event)">

<input class="form-control mb-3" placeholder="Full Name" required>

<textarea class="form-control mb-3" placeholder="Address" required></textarea>

<input class="form-control mb-3" placeholder="Phone Number" required>

<button class="btn btn-success w-100">
Confirm Order
</button>

</form>

</div>

<!-- BILL SECTION -->
<div class="col-md-6">

<div class="bill-box">

<h4>🧾 Bill Summary</h4>

<ul id="billItems"></ul>

<h5>Total: ₹<span id="billTotal">0</span></h5>

</div>

</div>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadBill(){

let list = document.getElementById("billItems");
let total = 0;

list.innerHTML = "";

cart.forEach(item => {

let li = document.createElement("li");
li.innerText = item.name + " — ₹" + item.price;

list.appendChild(li);

total += item.price;
});

document.getElementById("billTotal").innerText = total;
}

function confirmOrder(e){

e.preventDefault();

alert("✅ Order placed successfully!");

localStorage.removeItem("cart");

window.location.href = "home.html";
}

loadBill();

</script>

</body>
</html>
