<!DOCTYPE html>
<html>
<head>
<title>Men Collection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Top Cart Bar -->
<div class="container mt-3 d-flex justify-content-between">
  <h4>Shopping Section</h4>
  <div>
    🛒 ₹<span id="cartTotal">0</span>
    <button class="btn btn-sm btn-dark" onclick="showCart()">Cart</button>
    <button class="btn btn-success btn-sm"
onclick="goToCheckout()">
Checkout
</button>
  </div>
</div>

<h2 class="text-center mt-4">Men Collection</h2>

<section class="products-section container">
<div class="row g-4">

<!-- Product 1 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="men1.png">
    <div class="product-info">
      <p class="product-title">Men Shirt</p>
      <p class="product-price">₹999</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Men Shirt',999)">Add to Cart</button>
    </div>
  </div>
</div>

<!-- Product 2 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="men2.png">
    <div class="product-info">
      <p class="product-title">Casual Jacket</p>
      <p class="product-price">₹1999</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Casual Jacket',1999)">Add to Cart</button>
    </div>
  </div>
</div>

<!-- Product 3 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="men3.png">
    <div class="product-info">
      <p class="product-title">Denim Jeans</p>
      <p class="product-price">₹1499</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Denim Jeans',1499)">Add to Cart</button>
    </div>
  </div>
</div>

<!-- Product 4 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="men4.png">
    <div class="product-info">
      <p class="product-title">Formal Blazer</p>
      <p class="product-price">₹2499</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Formal Blazer',2499)">Add to Cart</button>
    </div>
  </div>
</div>

</div>
</section>

<div class="text-center mb-4">
  <a href="home.html" class="btn btn-dark">⬅ Back to Home</a>
</div>

<script src="cart.js"></script>
</body>
</html>
<script src="cart.js"></script>
