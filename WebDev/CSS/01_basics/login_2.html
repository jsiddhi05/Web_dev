<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup Form</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .input-field {
      padding: 12px 16px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background-color: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      outline: none;
      width: 100%;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    .email-wrapper {
      position: relative;
    }

    .email-wrapper input {
      width: 100%;
    }

    .check-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      background-color: #4CAF50;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <form class="form-container">
    <div class="email-wrapper">
      <input class="input-field" type="email" placeholder="Email" required />
      <div class="check-icon"></div>
    </div>
    <div class="row">
      <input type="text" placeholder="First name" class="input-field" />
      <input type="text" placeholder="Last name" class="input-field" />
    </div>
    <input class="input-field" type="password" placeholder="Password" />
  </form>
</body>
</html>
