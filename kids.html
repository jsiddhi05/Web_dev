<!DOCTYPE html>
<html>
<head>
<title>Kids Collection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Top Cart Bar -->
<div class="container mt-3 d-flex justify-content-between">
  <h4>Shopping Section</h4>
  <div>
    🛒 ₹<span id="cartTotal">0</span>
    <button class="btn btn-sm btn-dark" onclick="showCart()">Cart</button>
    <button class="btn btn-success btn-sm"
onclick="goToCheckout()">
Checkout
</button>
  </div>
</div>

<h2 class="text-center mt-4">Kids Collection</h2>

<section class="products-section container">
<div class="row g-4">

<!-- Product 1 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="kid1.png">
    <div class="product-info">
      <p class="product-title">Kids T-Shirt</p>
      <p class="product-price">₹499</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Kids T-Shirt',499)">Add to Cart</button>
    </div>
  </div>
</div>

<!-- Product 2 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="kid2.png">
    <div class="product-info">
      <p class="product-title">Kids Dress</p>
      <p class="product-price">₹699</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Kids Dress',699)">Add to Cart</button>
    </div>
  </div>
</div>

<!-- Product 3 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="kid3.png">
    <div class="product-info">
      <p class="product-title">Kids Hoodie</p>
      <p class="product-price">₹799</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Kids Hoodie',799)">Add to Cart</button>
    </div>
  </div>
</div>

<!-- Product 4 -->
<div class="col-md-3">
  <div class="product-card">
    <img src="kid4.png">
    <div class="product-info">
      <p class="product-title">Kids Set</p>
      <p class="product-price">₹999</p>
      <button class="btn btn-warning btn-sm"
        onclick="addToCart('Kids Set',999)">Add to Cart</button>
    </div>
  </div>
</div>

</div>
</section>

<div class="text-center mb-4">
  <a href="home.html" class="btn btn-dark">⬅ Back to Home</a>
</div>

<script src="cart.js"></script>
</body>
</html>
